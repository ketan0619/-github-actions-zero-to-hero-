<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitOps AI</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top left, #24243e, #0f0c29);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Keeps everything on one page */
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo { width: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #4facfe); }
        h1 { color: white; font-size: 28px; letter-spacing: 1px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 20px; }

        form { display: grid; gap: 12px; }
        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.15); outline: 1px solid #4facfe; }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #ff4b8a, #4facfe);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 5px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4); }

        /* Stylish Result Section */
        .result {
            margin-top: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        .bmi-badge {
            background: rgba(79, 172, 254, 0.2);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #4facfe;
            margin-bottom: 15px;
        }
        .bmi-badge h2 { color: #4facfe; font-size: 22px; margin-bottom: 2px; }
        .bmi-badge span { color: #fff; font-size: 12px; text-transform: uppercase; opacity: 0.8; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 12px;
            text-align: left;
        }
        .stat-card b { color: #ff4b8a; font-size: 11px; display: block; text-transform: uppercase; }
        .stat-card p { color: white; font-size: 13px; margin-top: 2px; line-height: 1.4; }

        .full-width { grid-column: span 2; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="/static/logo.png" class="logo" alt="">
    <h1>FitOps AI</h1>
    <p class="subtitle">Personalized Health Intelligence</p>

    <form method="POST">
        <input type="number" name="age" placeholder="Age" required>
        <input type="number" name="height" placeholder="Height (cm)" required>
        <input type="number" name="weight" placeholder="Weight (kg)" required>
        <button type="submit">Generate Plan</button>
    </form>

    <!-- This section only shows if Python sends results -->
    {% if result %}
    <div class="result">
        <div class="bmi-badge">
            <h2>{{result.bmi}}</h2>
            <span>BMI - {{result.category}}</span>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <b>Steps</b>
                <p>{{result.steps}} / day</p>
            </div>
            <div class="stat-card">
                <b>Workout</b>
                <p>{{result.workout}}</p>
            </div>
            <div class="stat-card full-width">
                <b>Diet Plan</b>
                <p>{{result.diet}}</p>
            </div>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
